name: Daily Arch Pacman Sync
on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sync-pacman:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Fetch, Extract, and Parse Arch Linux Extra DB
        run: |
          echo "Downloading official Arch Linux Extra repository database..."
          curl -sL https://mirrors.kernel.org/archlinux/extra/os/x86_64/extra.db --output extra.db

          echo "Extracting metadata files to memory..."
          mkdir -p arch_db
          tar -xf extra.db -C arch_db/

          echo "Running optimized internal structural parser..."
          # Uses system awk to crawl the extracted directory, parse individual 'desc' files, 
          # and output a perfectly formatted, unified JSON database block.
          awk '
            BEGIN {
              print "["
              first = 1
            }
            # Detect when we transition to a new package description file
            ARGIND != last_argind {
              if (!first && name != "") {
                printf ",\n{\"name\":\"%s\",\"version\":\"%s\",\"desc\":\"%s\",\"filename\":\"%s\",\"size\":%s,\"url\":\"%s\"}", name, version, desc, filename, size, url
              }
              name = ""; version = ""; desc = ""; filename = ""; size = 0; url = ""
              first = 0
              last_argind = ARGIND
            }
            # Extract standard Pacman meta field flags
            /%NAME%/     { getline; name = $0; next }
            /%VERSION%/  { getline; version = $0; next }
            /%DESC%/     { getline; desc = $0; gsub(/"/, "\\\"", desc); next }
            /%FILENAME%/ { getline; filename = $0; next }
            /%CSIZE%/    { getline; size = $0; next }
            /%URL%/      { getline; url = $0; next }
            END {
              # Print the very last parsed record in the directory tree loop
              if (name != "") {
                printf ",\n{\"name\":\"%s\",\"version\":\"%s\",\"desc\":\"%s\",\"filename\":\"%s\",\"size\":%s,\"url\":\"%s\"}", name, version, desc, filename, size, url
              }
              print "\n]"
            }
          ' arch_db/*/desc > temp_pacman.json

          # Clean up any potential double commas caused by directory sorting structures
          sed 's/\[,/[/' temp_pacman.json > pacman_packages.json

          echo "Cleaning up local workspace caches..."
          rm -rf extra.db arch_db temp_pacman.json

      - name: Push Optimized Matrix to Repository
        run: |
          git config --global user.name "PacmanDataBot"
          git config --global user.email "bot@arch.explorer"
          git add pacman_packages.json
          git commit -m "Automated synchronization of official Arch Pacman Extra repo" || exit 0
          git push
